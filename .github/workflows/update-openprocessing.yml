name: Update OpenProcessing Works

on:
  workflow_dispatch:
  schedule:
    - cron: "0 21 * * *"

permissions:
  contents: write

jobs:
  update-openprocessing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update OpenProcessing data
        env:
          OPENPROCESSING_PROFILE_URL: https://openprocessing.org/@u265449#sketches
        run: node scripts/update-openprocessing.js

      - name: Commit updated JSON
        run: |
          if git diff --quiet data/openprocessing.json; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/openprocessing.json
          git commit -m "chore: update OpenProcessing works"
          git push
