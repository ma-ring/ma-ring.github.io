name: Update ProtoPedia Works

on:
  workflow_dispatch:
  schedule:
    - cron: "10 19 * * *"

permissions:
  contents: write

jobs:
  update-protopedia:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Update ProtoPedia data
        env:
          PROTOPEDIA_API_V2_TOKEN: ${{ secrets.PROTOPEDIA_API_V2_TOKEN }}
        run: node scripts/update-protopedia.mjs

      - name: Commit updated JSON
        run: |
          if git diff --quiet -- data/protopedia.json; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/protopedia.json
          git commit -m "Update ProtoPedia works"
          git push
