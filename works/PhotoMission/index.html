<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Mission</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <h1>PHOTO<br>MISSION</h1>
      <p class="copy">いつもの景色を、違う見方で。</p>
    </section>

    <section class="mission-card">
      <p class="mission-label" id="category">TODAY'S MISSION</p>
      <div class="icon" id="icon">🔍</div>
      <h2 id="missionText">青いものを5つ探そう</h2>
      <p class="hint" id="hint">見慣れた道にも、意外とたくさん隠れているかも。</p>

      <div class="buttons">
        <button id="newMission">New Mission</button>
        <button id="copyMission">Copy</button>
        <button id="shareMission">Share</button>
      </div>
    </section>

    <section class="mini-info">
      <p>
        散歩中、通勤中、部屋の中。<br>
        1つのお題で、見慣れた景色が少しだけゲームになります。
      </p>
    </section>
  </main>

  <footer>
    <p>© MAHOO LAB</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
