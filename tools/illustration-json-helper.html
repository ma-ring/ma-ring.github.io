<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Illustration JSON Helper</title>
  <style>
    body {
      margin: 0;
      padding: 32px 20px 48px;
      font-family: "Helvetica Neue", Arial, sans-serif;
      color: #111217;
      background: #fbfaf7;
      line-height: 1.7;
    }

    main {
      max-width: 720px;
      margin: 0 auto;
    }

    h1 {
      margin-top: 0;
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 500;
      letter-spacing: 0.04em;
    }

    p {
      color: #44444c;
    }

    form {
      display: grid;
      gap: 16px;
      margin-top: 28px;
      padding: 24px;
      border: 1px solid #e7e2dc;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.8);
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d8d2ca;
      border-radius: 12px;
      font: inherit;
      background: #fff;
    }

    button {
      width: fit-content;
      padding: 12px 18px;
      border: 1px solid #111217;
      border-radius: 999px;
      background: #111217;
      color: #fff;
      font: inherit;
      cursor: pointer;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      margin-top: 20px;
      padding: 16px;
      border: 1px solid #d8d2ca;
      border-radius: 18px;
      font: 14px/1.6 Consolas, Monaco, monospace;
      background: #fff;
    }
  </style>
</head>
<body>
  <main>
    <h1>Illustration JSON Helper</h1>
    <p>Instagram作品を追加するときに、JSONへ貼り付ける1件分のデータを生成します。</p>

    <form id="helperForm">
      <label>
        Title
        <input id="title" name="title" type="text" placeholder="うな重の布団" />
      </label>

      <label>
        Instagram URL
        <input id="url" name="url" type="url" placeholder="https://www.instagram.com/p/XXXXXXXX/" required />
      </label>

      <label>
        Thumbnail Path
        <input id="thumbnail" name="thumbnail" type="text" placeholder="./assets/illustrations/unaju-bed.jpg" required />
      </label>

      <label>
        Date
        <input id="date" name="date" type="date" />
      </label>

      <button type="submit">Generate JSON</button>
    </form>

    <textarea id="output" readonly aria-label="Generated JSON"></textarea>
  </main>

  <script>
    const form = document.getElementById("helperForm");
    const output = document.getElementById("output");

    form.addEventListener("submit", (event) => {
      event.preventDefault();

      const formData = new FormData(form);
      const entry = {
        title: formData.get("title").trim(),
        url: formData.get("url").trim(),
        thumbnail: formData.get("thumbnail").trim(),
        date: formData.get("date").trim()
      };

      Object.keys(entry).forEach((key) => {
        if (!entry[key]) {
          delete entry[key];
        }
      });

      output.value = `${JSON.stringify(entry, null, 2)},`;
      output.select();
    });
  </script>
</body>
</html>
